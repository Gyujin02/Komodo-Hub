{% extends "shared/base.html" %}
{% block content %}
<div class="dash-wrapper">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-section-label">{{ sidebar_label | default('Menu') }}</div>
      {% block sidebar_links %}{% endblock %}
    </div>
    <div class="sidebar-bottom">
      <div class="sidebar-user-name">{{ current_user.display_name }}</div>
      <a href="{{ url_for('auth.logout') }}" class="nav-item" style="color:#dc3545;margin-top:8px">
         Logout
      </a>
    </div>
  </aside>
  <main class="dash-main">
    {% block dash_content %}{% endblock %}
  </main>
</div>
{% endblock %}
